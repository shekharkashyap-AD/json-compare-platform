name: Build and Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]

    steps:
      # Step 1: Checkout the code
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 2: Setup Node.js
      - name: 🔧 Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      # Step 3: Install Dependencies
      - name: 📦 Install Dependencies
        run: |
          echo "🔄 Installing npm dependencies..."
          npm ci
          echo "✅ Dependencies installed successfully"
        env:
          CI: true

      # Step 4: Lint code
      - name: 🔍 Lint code
        run: |
          echo "🔍 Running ESLint..."
          npm run lint --if-present
          echo "✅ Linting completed"
        continue-on-error: true

      # Step 5: Type check
      - name: 📝 Type check
        run: |
          echo "📝 Running TypeScript type check..."
          npm run type-check --if-present
          echo "✅ Type check completed"
        continue-on-error: true

      # Step 6: Run tests
      - name: 🧪 Run tests
        run: |
          echo "🧪 Running test suite..."
          npm run test --if-present
          echo "✅ Tests completed"
        continue-on-error: true

      # Step 7: Build the Application
      - name: 🏗️ Build the Application
        run: |
          echo "🏗️ Building production bundle..."
          npm run build
          echo "✅ Build completed successfully"
        env:
          CI: true
          NODE_ENV: production

      # Step 8: Verify build output
      - name: ✔️ Check build output
        run: |
          echo "📂 Verifying dist folder..."
          if [ ! -d "dist" ]; then
            echo "❌ Build failed: dist folder not created"
            exit 1
          fi
          echo "✅ Build successful - dist folder exists"
          echo ""
          echo "📊 Build artifacts:"
          ls -lah dist/ | head -20
          echo ""
          echo "📁 Total dist size:"
          du -sh dist/

      # Step 9: Deploy to Firebase Hosting (PR Preview)
      - name: 🚀 Deploy to Firebase Hosting (PR Preview)
        if: github.event_name == 'pull_request'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          channelId: pr-${{ github.event.number }}
          projectId: json-compare-platform
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks

      # Step 10: Deploy to Firebase Hosting (Production)
      - name: 🌐 Deploy to Firebase Hosting (Production)
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          channelId: live
          projectId: json-compare-platform
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks

      # Step 11: Post deployment summary
      - name: 📋 Post deployment summary
        if: always()
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployment Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Event Type**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit SHA**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit Message**: ${{ github.event.head_commit.message }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Author**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Job Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployment URLs" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "- **Preview URL**: https://json-compare-platform-abc123.web.app" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Production URL**: https://json-compare-platform-abc123.web.app" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Workflow Execution Time" >> $GITHUB_STEP_SUMMARY
          echo "- Started: ${{ job.start_time }}" >> $GITHUB_STEP_SUMMARY

      # Step 12: Notify on Success
      - name: ✨ Success notification
        if: success()
        run: |
          echo "✅ ✅ ✅ DEPLOYMENT SUCCESSFUL ✅ ✅ ✅"
          echo ""
          echo "🎉 Your app has been deployed to Firebase Hosting!"
          echo ""
          echo "📱 View your live site:"
          echo "   https://json-compare-platform-abc123.web.app"
          echo ""
          echo "📊 View logs:"
          echo "   https://console.firebase.google.com/project/json-compare-platform-abc123/hosting"

      # Step 13: Notify on Failure
      - name: ⚠️ Failure notification
        if: failure()
        run: |
          echo "❌ ❌ ❌ DEPLOYMENT FAILED ❌ ❌ ❌"
          echo ""
          echo "Check the logs above for errors"
          echo ""
          exit 1
